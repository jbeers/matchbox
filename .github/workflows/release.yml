name: Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run Tests
        run: cargo test

  build-linux-windows:
    name: Build Linux & Windows Distributions
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu, x86_64-pc-windows-gnu, wasm32-wasip1
      
      - name: Install Cross-Compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64

      - name: Build Distributions
        run: |
          mkdir -p dist
          
          # Linux x64 (Host)
          cargo build --release --features cross-compile --target x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/release/matchbox dist/matchbox-linux-x64

          # Linux ARM64
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
          cargo build --release --features cross-compile --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/matchbox dist/matchbox-linux-arm64

          # Windows x64 (GNU)
          cargo build --release --features cross-compile --target x86_64-pc-windows-gnu
          cp target/x86_64-pc-windows-gnu/release/matchbox.exe dist/matchbox-windows-x64.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: matchbox-dist-linux-win
          path: dist/*

  build-macos:
    name: Build macOS Distributions
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin, wasm32-wasip1
      
      - name: Build Distributions
        run: |
          mkdir -p dist
          
          # macOS x64
          cargo build --release --features cross-compile --target x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/matchbox dist/matchbox-macos-x64

          # macOS ARM64
          cargo build --release --features cross-compile --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/matchbox dist/matchbox-macos-arm64

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: matchbox-dist-macos
          path: dist/*

  publish:
    name: Publish Release
    needs: [build-linux-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep "^version =" Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "VERSION=v$VERSION" >> $GITHUB_OUTPUT

      - name: Extract Changelog
        id: extract_changelog
        run: |
          # Extract content between [Unreleased] and the next ## heading
          sed -n '/## \[Unreleased\]/,/## /p' CHANGELOG.md | sed '1d;$d' > release_notes.md
          echo "BODY_PATH=release_notes.md" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          files: release-assets/*
          generate_release_notes: false
          draft: false
          prerelease: false
