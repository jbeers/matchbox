<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoxLang Todo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f6fa;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #app {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.6rem;
      color: #1a1a2e;
    }

    h1 span { color: #5b4dff; }

    #input-row {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.25rem;
    }

    #todo-input {
      flex: 1;
      padding: .6rem .9rem;
      border: 1.5px solid #d0d5e8;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }

    #todo-input:focus { border-color: #5b4dff; }

    #add-btn {
      padding: .6rem 1.1rem;
      background: #5b4dff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s;
    }

    #add-btn:hover { background: #4338e0; }

    #todo-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    #todo-list li {
      display: flex;
      align-items: center;
      padding: .65rem .5rem;
      border-bottom: 1px solid #f0f0f0;
      gap: .5rem;
    }

    #todo-list li:last-child { border-bottom: none; }

    #todo-list li.done .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    .todo-text {
      flex: 1;
      cursor: pointer;
      color: #222;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #c0392b;
      font-size: 1rem;
      cursor: pointer;
      opacity: .5;
      transition: opacity .2s;
      padding: 0 .25rem;
    }

    .remove-btn:hover { opacity: 1; }

    .empty { color: #aaa; font-style: italic; }
  </style>
</head>
<body>
  <div id="app">
    <h1>BoxLang <span>Todo</span></h1>

    <div id="input-row">
      <input
        type="text"
        id="todo-input"
        placeholder="What needs to be done?"
        autocomplete="off"
      />
      <button id="add-btn">Add</button>
    </div>

    <ul id="todo-list"></ul>
  </div>

  <!--
    Import the BoxLang-compiled ES module.
    Build it first: matchbox --target js todo.bxs
  -->
  <script type="module">
    import { addTodo, toggleTodo, removeTodo } from './todo.js';

    const input  = document.getElementById('todo-input');
    const addBtn = document.getElementById('add-btn');
    const list   = document.getElementById('todo-list');

    // Add a new task
    async function handleAdd() {
      const text = input.value.trim();
      if (!text) return;
      await addTodo(text);
      input.value = '';
      input.focus();
    }

    addBtn.addEventListener('click', handleAdd);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleAdd();
    });

    // Toggle done / remove via event delegation on the list
    list.addEventListener('click', async (e) => {
      const id = Number(e.target.getAttribute('data-id'));
      if (!id) return;

      if (e.target.classList.contains('remove-btn')) {
        await removeTodo(id);
      } else if (e.target.classList.contains('todo-text')) {
        await toggleTodo(id);
      }
    });
  </script>
</body>
</html>
